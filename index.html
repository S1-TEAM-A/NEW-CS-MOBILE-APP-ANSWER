<style>
/* =========================================================
   OnSite CS — Design System
   보안장비 VOC 현장조치 앱 (프로토타입)
   ========================================================= */
:root{
  --bg:#070B16;
  --bg2:#0A1120;
  --surface:#111A2E;
  --surface2:#17223B;
  --surface3:#1E2B48;
  --line:rgba(140,160,210,.12);
  --line2:rgba(140,160,210,.22);
  --text:#EDF2FF;
  --muted:#93A2C6;
  --muted2:#66759B;
  --primary:#00BFA5;
  --primary2:#0056D2;
  --violet:#0056D2;
  --violet2:#4C8DF0;
  --danger:#FF5B72;
  --warn:#FFB020;
  --ok:#00BFA5;
  --blue:#0056D2;
  --grad:linear-gradient(135deg,#0056D2 0%,#0082BB 52%,#00BFA5 100%);
  --grad-mint:linear-gradient(135deg,#0288C5 0%,#00BFA5 100%);
  --grad-danger:linear-gradient(135deg,#FF6B7E 0%,#FF3D6B 100%);
  --radius:22px;
  --radius-s:14px;
  --shadow:0 18px 50px -18px rgba(0,0,0,.65);
  --shadow-glow:0 10px 40px -8px rgba(0,191,165,.42);
  --spring:cubic-bezier(.22,1,.36,1);
  --spring2:cubic-bezier(.34,1.56,.64,1);
  --ease:cubic-bezier(.4,0,.2,1);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Malgun Gothic',sans-serif;
  background:
     radial-gradient(1200px 700px at 80% -10%, rgba(0,86,210,.10), transparent 60%),
     radial-gradient(900px 600px at -10% 20%, rgba(0,86,210,.10), transparent 55%),
     var(--bg);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;
  overflow:hidden;
  letter-spacing:-.01em;
  word-break:keep-all;
  overflow-wrap:break-word;
}
textarea,input,button{word-break:keep-all;overflow-wrap:break-word;}
/* ---------- Device frame ---------- */
.stage{width:100%;height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px;}
.phone{
  position:relative;width:400px;max-width:100%;height:min(860px,96dvh);
  background:var(--bg);
  border-radius:46px;
  box-shadow:0 40px 120px -30px rgba(0,0,0,.8), 0 0 0 11px #0b0f1a, 0 0 0 12.5px #1b2438, inset 0 0 0 1px rgba(255,255,255,.04);
  overflow:hidden;
  isolation:isolate;
}
@media (max-width:460px){
  .stage{padding:0;}
  .phone{width:100%;height:100dvh;border-radius:0;box-shadow:none;}
}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:30px;background:#05070d;border-radius:0 0 20px 20px;z-index:60;pointer-events:none;}
@media (max-width:460px){.notch{display:none;}}

/* ---------- App shell ---------- */
.app{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;background:transparent;z-index:1;}
.statusbar{height:calc(24px + var(--safe-top));padding:0 26px;display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:4px;font-size:13px;font-weight:600;color:var(--text);z-index:55;flex:none;}
@media (max-width:460px){.statusbar{height:calc(30px + var(--safe-top));}}
.statusbar .dots{display:flex;gap:5px;align-items:center;}
.statusbar .dots svg{opacity:.9}

/* screen stack */
.screens{position:relative;flex:1;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;will-change:transform,opacity;
  background:
    radial-gradient(850px 480px at 12% -6%, rgba(0,86,210,.15), transparent 58%),
    radial-gradient(760px 480px at 92% 106%, rgba(37,197,106,.13), transparent 58%),
    var(--bg);}
.screen::before{content:"";position:absolute;top:34%;left:-14%;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(31,198,192,.20),transparent 70%);filter:blur(55px);z-index:0;pointer-events:none;animation:orbA 17s ease-in-out infinite;}
.screen>*{position:relative;z-index:1;}
.screen .scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:28px;scrollbar-width:none;}
.screen .scroll::-webkit-scrollbar{display:none;}

/* transitions */
.scr-in-push{animation:pushIn .42s var(--spring) both;}
.scr-out-push{animation:pushOut .42s var(--spring) both;}
.scr-in-pop{animation:popScrIn .40s var(--spring) both;}
.scr-out-pop{animation:popScrOut .40s var(--spring) both;}
.scr-fade{animation:fadeUp .45s var(--spring) both;}
@keyframes pushIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes pushOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(-24%);opacity:.4;}}
@keyframes popScrIn{from{transform:translateX(-24%);opacity:.4;}to{transform:translateX(0);opacity:1;}}
@keyframes popScrOut{from{transform:translateX(0);}to{transform:translateX(100%);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px) scale(.99);}to{opacity:1;transform:none;}}

/* ---------- Header ---------- */
.hdr{display:flex;align-items:center;gap:12px;padding:8px 20px 12px;flex:none;}
.hdr .back{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line);color:var(--text);cursor:pointer;transition:transform .15s var(--spring2);}
.hdr .back:active{transform:scale(.9);}
.hdr h1{font-size:19px;font-weight:800;margin:0;flex:1;letter-spacing:-.02em;}
.hdr .sub{font-size:12px;color:var(--muted);font-weight:600;}

/* ---------- Typography helpers ---------- */
.eyebrow{font-size:12px;font-weight:700;color:var(--primary);letter-spacing:.04em;text-transform:uppercase;}
.big{font-size:30px;font-weight:850;letter-spacing:-.03em;line-height:1.1;}
.muted{color:var(--muted);}
.tiny{font-size:11.5px;}
.section-t{font-size:13px;font-weight:700;color:var(--muted);margin:22px 20px 10px;letter-spacing:.01em;}

/* ---------- Card ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
.card.g{background:linear-gradient(160deg,rgba(30,43,72,.9),rgba(17,26,46,.9));}
.reveal{opacity:0;transform:translateY(16px);animation:revUp .6s var(--spring) forwards;}
@keyframes revUp{to{opacity:1;transform:none;}}

/* ---------- Chips & badges ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;font-size:12px;font-weight:700;background:var(--surface2);border:1px solid var(--line);color:var(--muted);}
.chip.on{background:rgba(0,191,165,.14);border-color:rgba(0,191,165,.4);color:var(--primary);}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:9px;font-size:11.5px;font-weight:800;letter-spacing:.01em;}
.b-high{background:rgba(255,91,114,.16);color:#FF8494;}
.b-mid{background:rgba(255,176,32,.15);color:#FFC24D;}
.b-low{background:rgba(0,86,210,.15);color:#84AEFF;}
.b-done{background:rgba(45,212,191,.15);color:#5BE3CE;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;}

/* ---------- Buttons ---------- */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border-radius:16px;border:none;font-size:15.5px;font-weight:800;cursor:pointer;color:#04121a;background:var(--grad-mint);box-shadow:var(--shadow-glow);transition:transform .16s var(--spring2),box-shadow .2s;letter-spacing:-.01em;font-family:inherit;}
.btn:active{transform:scale(.965);}
.btn.grad{background:var(--grad);color:#fff;box-shadow:0 10px 34px -10px rgba(0,86,210,.6);}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line2);box-shadow:none;}
.btn.danger{background:var(--grad-danger);color:#fff;box-shadow:0 10px 30px -10px rgba(255,61,107,.5);}
.btn.sm{padding:11px 14px;font-size:13.5px;border-radius:13px;width:auto;box-shadow:none;}
.btn[disabled]{opacity:.4;pointer-events:none;filter:grayscale(.3);}
.iconbtn{display:grid;place-items:center;gap:6px;flex:1;padding:14px 8px;border-radius:16px;background:var(--surface2);border:1px solid var(--line);color:var(--text);cursor:pointer;font-size:12px;font-weight:700;transition:transform .15s var(--spring2),background .2s;}
.iconbtn:active{transform:scale(.94);}
.iconbtn .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;margin-bottom:2px;}

/* ---------- Sticky bottom action ---------- */
.dock{flex:none;padding:14px 20px calc(16px + var(--safe-bottom));background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:40;}

/* ---------- Bottom tab ---------- */
.tabbar{flex:none;display:flex;padding:8px 10px calc(10px + var(--safe-bottom));background:rgba(10,17,32,.85);backdrop-filter:blur(20px);border-top:1px solid var(--line);position:relative;z-index:40;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted2);cursor:pointer;font-size:10.5px;font-weight:700;transition:color .2s;position:relative;}
.tab.on{color:var(--primary);}
.tab .ti{transition:transform .3s var(--spring2);}
.tab.on .ti{transform:translateY(-2px);}
.tab .badge-n{position:absolute;top:0;right:calc(50% - 22px);background:var(--danger);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 4px;}

/* ---------- List rows ---------- */
.row{display:flex;align-items:center;gap:13px;padding:15px 0;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.avatar{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;font-weight:800;font-size:15px;flex:none;background:var(--surface3);color:var(--primary);}

/* ---------- Skeleton ---------- */
.skel{position:relative;overflow:hidden;background:var(--surface2);border-radius:12px;}
.skel::after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);animation:shimmer 1.3s infinite;}
@keyframes shimmer{100%{transform:translateX(100%);}}

/* ---------- Progress / stepper ---------- */
.track{height:6px;border-radius:6px;background:var(--surface2);overflow:hidden;}
.track > i{display:block;height:100%;border-radius:6px;background:var(--grad-mint);transition:width .6s var(--spring);}
.steps{display:flex;gap:6px;}
.steps > i{flex:1;height:5px;border-radius:5px;background:var(--surface2);transition:background .4s;}
.steps > i.on{background:var(--grad-mint);}

/* ---------- Toggle switch ---------- */
.sw{width:50px;height:30px;border-radius:20px;background:var(--surface3);position:relative;cursor:pointer;transition:background .3s;flex:none;border:1px solid var(--line);}
.sw.on{background:linear-gradient(135deg,#2FE3C6,#22D3EE);border-color:transparent;}
.sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .32s var(--spring2);box-shadow:0 2px 6px rgba(0,0,0,.3);}
.sw.on i{transform:translateX(20px);}

/* ---------- Bottom sheet ---------- */
.scrim{position:absolute;inset:0;background:rgba(3,6,14,.6);backdrop-filter:blur(3px);z-index:70;opacity:0;transition:opacity .3s;pointer-events:none;}
.scrim.show{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:28px 28px 0 0;z-index:71;transform:translateY(110%);transition:transform .44s var(--spring);padding:10px 20px calc(24px + var(--safe-bottom));border-top:1px solid var(--line2);max-height:88%;overflow-y:auto;scrollbar-width:none;pointer-events:none;}
.sheet::-webkit-scrollbar{display:none;}
.sheet.show{transform:translateY(0);pointer-events:auto;}
.grab{width:42px;height:5px;border-radius:5px;background:var(--line2);margin:6px auto 14px;}

/* ---------- Voice waveform ---------- */
.wave{display:flex;align-items:center;justify-content:center;gap:4px;height:70px;}
.wave i{width:5px;border-radius:5px;background:var(--grad-mint);animation:wv 1s ease-in-out infinite;}
@keyframes wv{0%,100%{height:12px;}50%{height:52px;}}
.mic{width:88px;height:88px;border-radius:50%;background:var(--grad-mint);display:grid;place-items:center;margin:6px auto;box-shadow:0 0 0 0 rgba(0,191,165,.5);animation:micpulse 1.6s infinite;}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(0,191,165,.45);}70%{box-shadow:0 0 0 26px rgba(0,191,165,0);}100%{box-shadow:0 0 0 0 rgba(0,191,165,0);}}

/* ---------- Checklist ---------- */
.check{display:flex;align-items:flex-start;gap:13px;padding:15px;border-radius:16px;background:var(--surface2);border:1.5px solid var(--line);cursor:pointer;transition:border-color .25s,background .25s,transform .12s var(--spring2);margin-bottom:10px;}
.check:active{transform:scale(.985);}
.check.sel{border-color:var(--primary);background:rgba(0,191,165,.08);}
.check .box{width:26px;height:26px;border-radius:9px;border:2px solid var(--line2);flex:none;display:grid;place-items:center;transition:.25s;margin-top:1px;}
.check.sel .box{background:var(--grad-mint);border-color:transparent;}
.check .box svg{opacity:0;transform:scale(.4);transition:.3s var(--spring2);}
.check.sel .box svg{opacity:1;transform:scale(1);}

/* ---------- Toast ---------- */
.toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:rgba(20,30,52,.96);border:1px solid var(--line2);color:var(--text);padding:13px 18px;border-radius:15px;font-size:13.5px;font-weight:700;z-index:90;opacity:0;transition:.35s var(--spring);box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;pointer-events:none;white-space:nowrap;word-break:keep-all;max-width:92%;line-height:1.4;}
.toast br{display:block;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- Success burst ---------- */
.burst{width:110px;height:110px;border-radius:50%;background:var(--grad-mint);display:grid;place-items:center;margin:20px auto;position:relative;animation:pop .55s var(--spring2) both;box-shadow:0 0 60px -6px rgba(0,191,165,.6);}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.12);}100%{transform:scale(1);}}
.burst svg path{stroke-dasharray:60;stroke-dashoffset:60;animation:draw .5s .25s forwards var(--ease);}
@keyframes draw{to{stroke-dashoffset:0;}}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--primary);animation:ringout 1s .2s ease-out forwards;}
@keyframes ringout{to{transform:scale(1.7);opacity:0;}}

/* map */
.map{position:relative;height:250px;border-radius:20px;overflow:hidden;border:1px solid var(--line);background:radial-gradient(120% 120% at 50% 0,#12203a,#0b1220);}
.pin{position:absolute;transform:translate(-50%,-100%);z-index:3;}
.pin .p{width:30px;height:30px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);display:grid;place-items:center;box-shadow:0 6px 14px rgba(0,0,0,.5);}
.pin .p b{transform:rotate(-45deg);color:#04121a;font-weight:800;font-size:13px;}

.expand{max-height:0;overflow:hidden;transition:max-height .45s var(--spring);}
.expand.open{max-height:600px;}

.fadein{animation:fadeUp .5s var(--spring) both;}
.stagger>*{opacity:0;transform:translateY(14px);animation:revUp .55s var(--spring) forwards;}

.numg{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.numm{background:var(--grad-mint);-webkit-background-clip:text;background-clip:text;color:transparent;}
hr.sep{border:none;border-top:1px solid var(--line);margin:14px 0;}
.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;font-size:13.5px;border-bottom:1px solid var(--line);}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--muted);font-weight:600;flex:none;}
.kv .v{text-align:right;font-weight:700;}
.pill-tabs{display:flex;gap:7px;padding:2px;background:var(--surface2);border-radius:14px;border:1px solid var(--line);}
.pill-tabs button{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:13px;border-radius:11px;cursor:pointer;transition:.25s;font-family:inherit;}
.pill-tabs button.on{background:var(--surface3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.25);}
textarea,input{font-family:inherit;}
.ta{width:100%;background:var(--surface2);border:1.5px solid var(--line2);border-radius:16px;padding:15px;color:var(--text);font-size:14.5px;line-height:1.55;resize:none;outline:none;transition:border-color .2s;}
.digclock{width:100%;box-sizing:border-box;background:linear-gradient(150deg,rgba(0,191,165,.10),var(--surface2));border:1.5px solid rgba(0,191,165,.4);border-radius:16px;padding:14px 16px;color:var(--primary);font-size:34px;font-weight:800;letter-spacing:.05em;text-align:center;outline:none;font-variant-numeric:tabular-nums;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;}
.digclock::-webkit-calendar-picker-indicator{filter:invert(.65) sepia(1) saturate(4) hue-rotate(120deg);cursor:pointer;}
.datefield{width:100%;box-sizing:border-box;background:var(--surface2);border:1.5px solid var(--line2);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14.5px;font-weight:700;outline:none;font-family:inherit;}
.datefield::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer;}
.ta:focus{border-color:var(--primary);}

/* ============ 항상 살아있는 모션 ============ */
/* 배경 앰비언트 오브 (블루·그린이 계속 부유) */
.orb{position:absolute;border-radius:50%;filter:blur(64px);z-index:0;pointer-events:none;opacity:.55;}
.orb1{width:340px;height:340px;background:radial-gradient(circle,rgba(0,86,210,.6),transparent 70%);top:-70px;left:-90px;animation:orbA 15s ease-in-out infinite;}
.orb2{width:320px;height:320px;background:radial-gradient(circle,rgba(37,197,106,.52),transparent 70%);bottom:-50px;right:-80px;animation:orbB 18s ease-in-out infinite;}
.orb3{width:240px;height:240px;background:radial-gradient(circle,rgba(31,198,192,.4),transparent 70%);top:42%;left:56%;animation:orbA 21s ease-in-out infinite reverse;}
@keyframes orbA{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(46px,64px) scale(1.16);}}
@keyframes orbB{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-54px,-46px) scale(1.12);}}

/* 무한대(∞) 브랜드 로고 — 빛이 계속 흐름 */
.logoTile{width:92px;height:92px;border-radius:26px;background:#fff;display:grid;place-items:center;margin:0 auto;box-shadow:0 22px 55px -12px rgba(0,86,210,.5),0 0 0 1px rgba(255,255,255,.08);animation:tileFloat 4.8s ease-in-out infinite;}
.logoImg{width:95px;max-width:32%;height:auto;display:block;margin:0 auto;animation:tileFloat 4.8s ease-in-out infinite;filter:drop-shadow(0 18px 40px rgba(0,86,210,.4));}
@keyframes tileFloat{0%,100%{transform:translateY(0) rotate(0);}50%{transform:translateY(-10px) rotate(-1.5deg);}}
.inf{width:56px;height:36px;overflow:visible;}
.inf .base{fill:none;stroke:url(#infg);stroke-width:9.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 2px 5px rgba(0,86,210,.3));}
.inf .flow{fill:none;stroke:#fff;stroke-width:9.5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:22 168;stroke-dashoffset:0;opacity:.85;animation:infFlow 2.6s linear infinite;}
@keyframes infFlow{to{stroke-dashoffset:-190;}}
.infMini{width:26px;height:18px;overflow:visible;}
.infMini path{fill:none;stroke:url(#infg2);stroke-width:12;stroke-linecap:round;stroke-linejoin:round;}

/* 주요 CTA에 광택이 계속 스쳐 지나감 */
.btn.shine{position:relative;overflow:hidden;}
.btn.shine::after{content:"";position:absolute;top:0;left:-70%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-18deg);animation:sheen 3.4s ease-in-out infinite;}
@keyframes sheen{0%{left:-70%;}55%,100%{left:150%;}}

/* ============ 길찾기 · 내비게이션 ============ */
.navmap{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
/* Leaflet 지도 (키 없이 OSM) */
.leafmap{height:260px;border-radius:20px;overflow:hidden;border:1px solid var(--line);background:#0a1322;}
.leafmini{height:150px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#0a1322;}
.leaflet-container{background:#e6ebf0;font-family:inherit;}
.leaflet-popup-content-wrapper{background:var(--surface2);color:var(--text);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.leaflet-popup-tip{background:var(--surface2);}
.leaflet-popup-content{margin:9px 12px;font-size:12.5px;line-height:1.5;}
.leaflet-bar a{background:var(--surface2);color:var(--text);border-color:var(--line);}
.leaflet-bar a:hover{background:var(--surface3);}
.route-line{stroke:#25C56A;stroke-width:4.5;fill:none;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 4px rgba(37,197,106,.8));stroke-dasharray:100;stroke-dashoffset:100;animation:routeDraw 1.5s .15s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes routeDraw{to{stroke-dashoffset:0;}}
.route-flow{stroke:#EAFFF5;stroke-width:4.5;fill:none;stroke-linecap:round;stroke-dasharray:5 95;stroke-dashoffset:0;opacity:.95;animation:flowDash 2.6s linear infinite;}
@keyframes flowDash{to{stroke-dashoffset:-100;}}
.glass{background:rgba(15,23,42,.82);backdrop-filter:blur(12px);border:1px solid var(--line2);}
/* 동선 드래그 재정렬 */
.rrow{transition:border-color .2s,transform .16s var(--spring),opacity .2s;}
.rrow.dragging{opacity:.35;}
.rrow.over{border-color:var(--primary)!important;transform:scale(1.015);box-shadow:0 8px 24px -10px rgba(0,191,165,.5);}
.grip{cursor:grab;color:var(--muted2);flex:none;padding:2px;display:grid;place-items:center;stroke-width:2.6;}
.grip:active{cursor:grabbing;color:var(--primary);}
/* 조치 원인별 완료 체크 */
.cdone{color:rgba(140,160,210,.25);}
.gcause.done{border-color:rgba(0,191,165,.45);}
.gcause.done .cdone{background:var(--grad-mint);border-color:transparent;color:#04121a;}
/* AI 분석 중 인터스티셜 */
.aiov{position:absolute;inset:0;z-index:82;background:rgba(7,11,22,.78);backdrop-filter:blur(9px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;pointer-events:none;padding:0 44px;}
.aiov.show{opacity:1;pointer-events:auto;}
.aiov-orb{width:96px;height:96px;border-radius:50%;background:var(--grad);display:grid;place-items:center;color:#fff;position:relative;box-shadow:0 0 55px -6px rgba(0,86,210,.65);animation:aiPulse 1.4s ease-in-out infinite;}
@keyframes aiPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.09);}}
.aiov-orb::before,.aiov-orb::after{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(47,227,198,.55);animation:aiRing 1.9s ease-out infinite;}
.aiov-orb::after{animation-delay:.95s;}
@keyframes aiRing{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.65);opacity:0;}}
.aiov-title{font-weight:850;font-size:19px;margin-top:24px;letter-spacing:-.02em;}
.aiov-sub{color:var(--muted);font-size:12.5px;margin-top:6px;}
.aiov-steps{margin-top:22px;width:100%;max-width:280px;}
.aiov-step{display:flex;align-items:center;gap:11px;padding:7px 0;opacity:.3;transform:translateX(-6px);transition:opacity .35s var(--spring),transform .35s var(--spring);}
.aiov-step.on{opacity:1;transform:none;}
.aiov-ic{width:20px;height:20px;flex:none;display:grid;place-items:center;color:var(--primary);}
.aiov-spin{width:15px;height:15px;border-radius:50%;border:2px solid var(--line2);border-top-color:var(--primary);animation:aiSpin .7s linear infinite;}
@keyframes aiSpin{to{transform:rotate(360deg);}}
</style>
</head>

  ta.addEventListener('focus',finish,{once:true});
  ta.addEventListener('touchstart',finish,{once:true});
}

/* ---------- navigation ---------- */
function makeScreen(html){const d=document.createElement('div');d.className='screen';d.innerHTML=html;return d;}
function push(name,params={}){
  const html=VIEWS[name](params);
  const el=makeScreen(html);
  screensEl.appendChild(el);
  const prev=stack[stack.length-1];
  el.classList.add('scr-in-push');
  if(prev){prev.el.classList.add('scr-out-push');}
  stack.push({name,params,el});
  bindScreen(el,name,params);
  el.querySelector('.scroll')?.scrollTo(0,0);
  renderTabs();
}
function back(){
  if(stack.length<=1)return;
  const cur=stack.pop();
  const prev=stack[stack.length-1];
  cur.el.classList.remove('scr-in-push');
  cur.el.classList.add('scr-out-pop');
  if(prev){prev.el.classList.remove('scr-out-push');prev.el.classList.add('scr-in-pop');}
  const rm=()=>{cur.el.remove();};
  cur.el.addEventListener('animationend',rm,{once:true});
  setTimeout(rm,460);
  renderTabs();
}
function resetTo(name,params={}){
  stack.forEach(s=>s.el.remove());stack=[];
  const html=VIEWS[name](params);
  const el=makeScreen(html);el.classList.add('scr-fade');
  screensEl.appendChild(el);
  stack.push({name,params,el});
  bindScreen(el,name,params);
  renderTabs();
}
function switchTab(tab){
  if(activeTab===tab && stack.length===1)return;
  activeTab=tab;
  const map={home:'home',voc:'vocList',route:'route',alerts:'alerts',my:'my'};
  resetTo(map[tab]);
}

<div class="scroll"><div style="padding:14px 20px 0" class="fadein">
  <div class="card g" style="border-color:var(--line2);text-align:center;padding:28px 20px">
    <div style="width:62px;height:62px;border-radius:19px;background:var(--grad);display:grid;place-items:center;margin:0 auto 16px;color:#fff">${ic('ai',30)}</div>
    <div style="font-weight:850;font-size:18px">표준 AI 가이드 준비 중</div>
    <p class="muted" style="margin-top:10px;font-size:13.5px;line-height:1.65">「${v.codeName}」 유형은 아직 표준 진단·조치 가이드가 학습되지 않았어요.<br>지금은 <b style="color:var(--primary)">현장 전문가의 판단</b>이 가장 정확합니다.</p>

    <div class="tiny" style="line-height:1.55">지금 입력하시는 조치 결과가 <b style="color:var(--violet2)">${v.code} 가이드</b>의 학습 데이터가 됩니다. 다음 CS가 더 빨라져요.</div>

<div class="scroll">
  <div style="padding:6px 20px 0" class="fadein">
    <div class="card" style="background:linear-gradient(150deg,rgba(0,86,210,.14),rgba(17,26,46,.9));border-color:var(--line2);display:flex;gap:12px;align-items:flex-start">
      <div style="width:38px;height:38px;border-radius:12px;background:var(--grad);display:grid;place-items:center;flex:none;color:#fff">${ic('ai',20)}</div>

        <div style="font-weight:800;font-size:14px">AI 분석 완료</div>
        <div class="tiny muted" style="margin-top:3px;line-height:1.5">접수 내용·기기 매뉴얼·과거 이력을 종합했어요.<br>현장에서 <b style="color:var(--primary)">확인된 증상을 모두 선택</b>하세요. (복수 선택 가능)</div>

/* ---- AI Action guide (조치 방법만, 중복 제거) ---- */
VIEWS.guide=({id})=>{
  const v=VOCS.find(x=>x.id===id);const g=GUIDE[v.code];const st=STATE[v.id];
  const groups=dxGroupsOf(v.code);
  const chosen=(st.causes||[]).map(i=>groups[i]).filter(Boolean);
  const actions=[]; chosen.forEach(function(grp){grp.actions.forEach(function(a){if(actions.indexOf(a)<0)actions.push(a);});});
  return `
<div class="hdr"><div class="back">${ic('chevL',22)}</div><div style="flex:1"><h1 style="font-size:17px">AI 조치 가이드</h1><div class="sub">조치 방법 ${actions.length}개</div></div></div>
<div style="padding:0 20px 12px"><div class="steps"><i class="on"></i><i class="on"></i><i></i></div><div class="tiny muted" style="margin-top:8px">2/3 · 조치 수행</div></div>
<div class="scroll">
  <div style="padding:6px 20px 0" class="fadein">
    <div class="section-t" style="margin-left:2px">조치 방법 · 완료 시 체크</div>
  </div>
  <div style="padding:0 20px" id="guideSteps">
    ${actions.map((a,i)=>`
      <div class="card gstep" data-step="${i}" style="margin-bottom:11px;padding:15px;display:flex;gap:13px;align-items:flex-start;transition:.3s;opacity:0;transform:translateY(14px);animation:revUp .5s var(--spring) forwards;animation-delay:${.06+i*.07}s">
        <div class="snum" style="width:30px;height:30px;border-radius:10px;background:var(--surface3);color:var(--muted);display:grid;place-items:center;font-weight:800;flex:none;transition:.3s">${i+1}</div>
        <div style="flex:1;padding-top:3px;font-size:14.5px;line-height:1.55;white-space:pre-line">${a}</div>
      </div>`).join('')}
  </div>
  <div style="height:110px"></div>
</div>
<div class="dock"><button class="btn" id="toResult" data-id="${id}">${ic('check',17)} VOC 조치 결과 입력</button></div>`;
};

/* ---- Result (AI auto-filled) ---- */
VIEWS.result=({id})=>{
  const v=VOCS.find(x=>x.id===id);const g=GUIDE[v.code];const st=STATE[v.id];
  if(st.completed){
    return `
<div class="hdr"><div class="back">${ic('chevL',22)}</div><div style="flex:1"><h1 style="font-size:17px">조치 결과</h1><div class="sub">${v.company}</div></div><span class="badge b-done">완료</span></div>
<div class="scroll">
  <div style="padding:14px 20px 0" class="fadein">
    <div class="card" style="display:flex;gap:11px;align-items:center;background:linear-gradient(150deg,rgba(0,191,165,.12),rgba(17,26,46,.9));border-color:rgba(0,191,165,.3)">
      <div style="width:38px;height:38px;border-radius:12px;background:var(--grad-mint);display:grid;place-items:center;flex:none;color:#04121a">${ic('check',20,3)}</div>
      <div><div style="font-weight:800;font-size:14px">완료된 VOC예요</div><div class="tiny muted">${v.codeName}</div></div>
    </div>
    <div class="section-t" style="margin-left:2px">처리 상태</div>
    <div class="card" style="padding:14px 16px"><span style="font-weight:800;color:var(--primary)">${st.compStatus||'조치 완료'}</span></div>
    <div class="section-t" style="margin-left:2px">조치 결과</div>
    <div class="card" style="padding:16px;font-size:14.5px;line-height:1.7;white-space:pre-line">${st.result||'기록된 조치 결과가 없습니다.'}</div>
  </div>
  <div style="height:40px"></div>
</div>`;
  }
  const grps=dxGroupsOf(v.code);
  var _seen={};
  const auto = (st.aiMode==='use' && g && st.causes && st.causes.length)
    ? st.causes.map(function(i){return grps[i]?polishResult(grps[i].rs[0]):'';}).filter(function(x){if(!x||_seen[x])return false;_seen[x]=1;return true;}).join('\n') : '';
  st.result = st.result || auto;
  const willType = !!auto && !st.completed && st.result===auto;
  const statuses=['조치 완료','부분 완료','재방문 필요','원격 조치 완료'];
  if(statuses.indexOf(st.compStatus)<0) st.compStatus=statuses[0];
  return `
<div class="hdr"><div class="back">${ic('chevL',22)}</div><div style="flex:1"><h1 style="font-size:17px">조치 결과 입력</h1><div class="sub">${v.company}</div></div></div>
<div style="padding:0 20px 12px"><div class="steps"><i class="on"></i><i class="on"></i><i class="on"></i></div><div class="tiny muted" style="margin-top:8px">3/3 · 결과 기록</div></div>
<div class="scroll">
  <div style="padding:6px 20px 0" class="fadein">
    ${auto?`
    <div class="card" style="background:linear-gradient(150deg,rgba(0,191,165,.12),rgba(17,26,46,.9));border-color:rgba(0,191,165,.35);display:flex;gap:11px;align-items:center">
      <div style="width:38px;height:38px;border-radius:12px;background:var(--grad-mint);display:grid;place-items:center;flex:none;color:#04121a">${ic('ai',20)}</div>
      <div><div style="font-weight:800;font-size:14px">AI가 조치 결과를 작성했어요</div><div class="tiny muted">수행한 진단·조치를 바탕으로 표준 문구를 생성했습니다.<br>자유롭게 수정하세요.</div></div>
    </div>`:''}

    <div class="section-t" style="margin-left:2px">처리 상태</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px" id="statusPick">
      ${statuses.map((s)=>`<span class="chip ${s===st.compStatus?'on':''}" data-status="${s}" style="cursor:pointer">${s}</span>`).join('')}
    </div>

    <div class="section-t" style="margin-left:2px;margin-right:2px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <span>조치 결과 <span style="color:var(--danger)">*</span></span>
      <span class="chip tiny" data-voice="${id}" style="cursor:pointer;color:var(--primary);border-color:rgba(0,191,165,.4);flex:none">${ic('mic',12)} 음성으로 추가</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:11px">
      ${(function(){var seen={},out=[];(g?g.items:[]).forEach(function(it){var p=polishResult(it.r);if(p&&!seen[p]){seen[p]=1;out.push(p);}});return out.slice(0,3);})().map(r=>`<span class="chip tiny" data-quick="${r.replace(/"/g,'&quot;')}" style="cursor:pointer;display:block;width:100%;white-space:normal;text-align:left;line-height:1.5;border-radius:12px;padding:9px 13px">+ ${r}</span>`).join('')}
    </div>
    <textarea class="ta" id="resultTa" rows="4" placeholder="조치 내용을 입력하세요" ${willType?'data-type="1"':''}>${willType?'':st.result}</textarea>

    <div class="section-t" style="margin-left:2px">추가 특이사항</div>
    <div class="card" style="padding:6px 16px">
      <div class="kv" style="align-items:center"><span class="k" style="color:var(--text);font-weight:700">부품 교체 발생</span><div class="sw" data-flag="part"><i></i></div></div>
      <div class="kv" style="align-items:center;border:none"><span class="k" style="color:var(--text);font-weight:700">고객 확인 완료</span><div class="sw on" data-flag="confirm"><i></i></div></div>
    </div>
  </div>
  <div style="height:120px"></div>
</div>
<div class="dock"><button class="btn shine" id="complete" data-id="${id}">VOC 완료 처리하기</button></div>`;
};

/* ---- Completion ---- */

  <div class="burst"><div class="ring"></div><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#04121a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></div>

    <div class="kv" style="border:none;flex-direction:column;align-items:flex-start;gap:6px"><span class="k">조치 결과</span><span class="v" style="text-align:left;font-weight:600;line-height:1.5">${st.result}</span></div>

    <div style="width:36px;height:36px;border-radius:11px;background:var(--violet);display:grid;place-items:center;flex:none">${ic('flash',18)}</div>

  </div>`:''}
  <div class="fadein" style="animation-delay:.6s;margin-top:24px">
    <button class="btn" data-home="1">${ic('home',17)} 다음 VOC 처리하기</button>
  </div>
</div>`;
};

/* ---- 길찾기 · 내비게이션 ---- */

  const v=VOCS.find(x=>x.id===id);
  const t=9*60+41+v.eta; const arrive=(Math.floor(t/60)%24)+':'+String(t%60).padStart(2,'0');
  const road=(v.short||'').split(' ')[0];
  const ROUTE="M50 142 L50 120 Q50 108 40 108 L26 108 Q16 108 16 96 L16 64 Q16 52 30 52 L58 52 Q70 52 70 40 L70 22";
  return `
<div style="position:relative;flex:1;overflow:hidden">
  <svg class="navmap" viewBox="0 0 100 150" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect x="-5" y="-5" width="110" height="160" fill="#0a1322"/>
    <g fill="rgba(120,145,190,.05)">
      <rect x="20" y="56" width="26" height="48" rx="3"/><rect x="54" y="56" width="12" height="48" rx="3"/>
      <rect x="20" y="6" width="26" height="42" rx="3"/><rect x="54" y="6" width="12" height="42" rx="3"/>
      <rect x="74" y="24" width="24" height="24" rx="3"/><rect x="20" y="112" width="46" height="34" rx="3"/>

    <g stroke="rgba(150,170,210,.10)" stroke-width="7" stroke-linecap="round">
      <line x1="16" y1="-5" x2="16" y2="155"/><line x1="50" y1="-5" x2="50" y2="155"/><line x1="70" y1="-5" x2="70" y2="155"/>
      <line x1="-5" y1="52" x2="105" y2="52"/><line x1="-5" y1="108" x2="105" y2="108"/>
    </g>
    <g stroke="rgba(150,170,210,.05)" stroke-width="2.5"><line x1="34" y1="-5" x2="34" y2="155"/><line x1="88" y1="-5" x2="88" y2="155"/><line x1="-5" y1="26" x2="105" y2="26"/><line x1="-5" y1="82" x2="105" y2="82"/><line x1="-5" y1="134" x2="105" y2="134"/></g>
    <path pathLength="100" class="route-line" d="${ROUTE}"/>
    <path id="route" pathLength="100" class="route-flow" d="${ROUTE}"/>
    <circle cx="50" cy="142" r="6" fill="#2E8BF6"/>
    <circle cx="50" cy="142" r="6" fill="none" stroke="#2E8BF6" stroke-width="1.5"><animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;0;.7" dur="2s" repeatCount="indefinite"/></circle>
    <g transform="translate(70,22)">

      <path d="M0 0 C7 0 10 -6 10 -10 A10 10 0 1 0 -10 -10 C-10 -6 -7 0 0 0 Z" fill="#25C56A" stroke="#fff" stroke-width="1"/>
      <circle cx="0" cy="-10" r="4" fill="#fff"/>
    </g>
    <g class="car">
      <circle r="9" fill="#2E8BF6" opacity=".22"/>
      <circle r="5.5" fill="#fff"/>
      <path d="M0 -3.4 L2.7 2.6 L0 1 L-2.7 2.6 Z" fill="#2E8BF6"/>
    </g>
  </svg>

  <div style="position:absolute;top:10px;left:16px;right:16px;display:flex;gap:10px;align-items:center;z-index:5">
    <div class="back glass" style="width:44px;height:44px;border-radius:14px;display:grid;place-items:center;flex:none;cursor:pointer">${ic('chevL',22)}</div>
    <div class="glass" style="flex:1;padding:10px 14px;border-radius:14px;display:flex;align-items:center;gap:11px;min-width:0">
      <span style="color:var(--primary);flex:none">${ic('nav',18)}</span>
      <div style="min-width:0"><div class="tiny muted" style="font-weight:600">목적지</div><div style="font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.company} · ${v.short}</div></div>
    </div>
  </div>

  <div style="position:absolute;top:80px;left:16px;right:16px;z-index:5" class="fadein">
    <div style="display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#2E7BF6,#25C56A);border-radius:18px;color:#fff;padding:14px 18px;box-shadow:0 12px 30px -10px rgba(37,197,106,.5)">
      <div style="font-size:30px;line-height:1;font-weight:700">↱</div>

      </div>
    </div>

};

function recommend(){
  // 가까운 순(거리 오름차순)
  return [...VOCS].filter(v=>!STATE[v.id].completed).sort((a,b)=>a.dist-b.dist);
}
function fmtRecv(r){ const m=String(r||'').match(/(\d{4})\.(\d{2})\.(\d{2})/); return m?`${+m[2]}/${+m[3]}`:'-'; }
let _mapSort='dist';
function mapVocs(){
  const arr=[...VOCS];
  if(_mapSort==='date') arr.sort((a,b)=>String(b.received||'').localeCompare(String(a.received||'')));
  else arr.sort((a,b)=>a.dist-b.dist);
  return arr;
}
/* 카카오맵 SDK 준비 대기 (autoload=false → kakao.maps.load 후 사용) */
var _kakaoReady=false,_kakaoQ=[];
function whenKakao(cb){ if(_kakaoReady) return cb(); _kakaoQ.push(cb); }
(function initKakao(){
  if(window.kakao && kakao.maps && kakao.maps.load){
    kakao.maps.load(function(){ _kakaoReady=true; _kakaoQ.splice(0).forEach(function(f){try{f();}catch(_){}}); });
  }
})();
function openKakaoMap(id){
  var v=VOCS.find(function(x){return x.id===id;});
  if(v&&typeof v.lat==='number'){ window.open('https://map.kakao.com/link/to/'+encodeURIComponent(v.company)+','+v.lat+','+v.lng,'_blank'); toast('카카오맵을 엽니다','nav'); }
}
function renderMap(scope){
  const el=scope.querySelector('#mapCanvas');
  if(el){
    el.innerHTML='<div style="display:grid;place-items:center;height:100%;color:var(--muted);font-size:12.5px">지도 불러오는 중…</div>';
    setTimeout(function(){ if(!_kakaoReady && el){ el.innerHTML='<div style="display:grid;place-items:center;height:100%;color:var(--muted);font-size:12px;text-align:center;padding:0 24px;line-height:1.6">카카오지도를 불러오지 못했어요.<br>카카오 개발자센터에 이 사이트 도메인이<br>등록됐는지 확인해주세요.</div>'; } },5000);
    whenKakao(function(){
      try{
        el.innerHTML='';
        var map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(36.48,127.25),level:8});
        var bounds=new kakao.maps.LatLngBounds();
        var iw=new kakao.maps.InfoWindow({removable:true,zIndex:5});
        VOCS.forEach(function(v){
          if(typeof v.lat!=='number') return;
          var pos=new kakao.maps.LatLng(v.lat,v.lng);
          var marker=new kakao.maps.Marker({map:map,position:pos,title:v.company});
          bounds.extend(pos);
          kakao.maps.event.addListener(marker,'click',(function(v,marker){return function(){
            iw.setContent('<div style="padding:9px 11px;font-size:12px;min-width:150px;line-height:1.5;font-family:inherit"><b>'+v.company+'</b><br><span style="color:#8E9398">'+v.short+' · '+v.dist+'km</span><br><button onclick="openKakaoMap(\''+v.id+'\')" style="margin-top:7px;width:100%;padding:7px;border:none;border-radius:8px;background:#0056D2;color:#fff;font-weight:700;font-size:12px;cursor:pointer">카카오맵 길찾기</button></div>');
            iw.open(map,marker);
          };})(v,marker));
        });
        if(!bounds.isEmpty()) map.setBounds(bounds);
        setTimeout(function(){try{map.relayout(); if(!bounds.isEmpty())map.setBounds(bounds);}catch(_){}} ,160);
      }catch(e){ el.innerHTML='<div style="display:grid;place-items:center;height:100%;color:var(--muted);font-size:12.5px;text-align:center;padding:0 20px;line-height:1.5">카카오지도를 불러오지 못했어요.<br>(카카오 개발자센터 Web 도메인 등록 확인)</div>'; }
    });
  }
  renderMapList(scope);
  scope.querySelectorAll('#mapSort [data-sort]').forEach(c=>c.onclick=()=>{
    _mapSort=c.dataset.sort;
    scope.querySelectorAll('#mapSort [data-sort]').forEach(x=>x.classList.toggle('on',x===c));
    renderMapList(scope);
  });
}
function renderMapList(scope){
  const listEl=scope.querySelector('#mapList'); if(!listEl) return;
  const arr=mapVocs();
  listEl.innerHTML=arr.map((v,i)=>`
    <div class="card" style="margin-bottom:11px;display:flex;gap:12px;align-items:center">
      <div class="mvopen" data-voc="${v.id}" style="cursor:pointer;flex:1;min-width:0;display:flex;gap:12px;align-items:center">
        <div style="width:30px;height:30px;border-radius:9px;background:var(--surface3);color:var(--primary);display:grid;place-items:center;font-weight:800;flex:none">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.company}</div>
          <div class="tiny muted" style="margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ic('pin',11)} ${v.addr}</div>
          <div class="tiny muted" style="margin-top:3px">${v.dist}km · 접수 ${fmtRecv(v.received)}</div>
        </div>
      </div>
      ${STATE[v.id].completed
        ? '<span class="badge b-done" style="flex:none">완료</span>'
        : `<span class="chip tiny" data-kakao="${v.id}" style="flex:none;cursor:pointer;color:var(--primary);border-color:rgba(0,191,165,.4);padding:8px 11px">${ic('nav',13)} 길찾기</span>`}
    </div>`).join('');
  listEl.querySelectorAll('.mvopen').forEach(n=>n.onclick=()=>push('detail',{id:n.dataset.voc}));
  listEl.querySelectorAll('[data-kakao]').forEach(n=>n.onclick=e=>{e.stopPropagation();openKakaoMap(n.dataset.kakao);});
}
function renderHomeMini(scope){
  const el=scope.querySelector('#homeMini'); if(!el || el._kInit) return; el._kInit=1;
  let near=[...VOCS].filter(v=>!STATE[v.id].completed).sort((a,b)=>a.dist-b.dist).slice(0,3);
  if(!near.length) near=[...VOCS].sort((a,b)=>a.dist-b.dist).slice(0,3);
  el.innerHTML='';
  whenKakao(function(){
    try{
      var map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(36.48,127.25),level:8});
      map.setDraggable(false); map.setZoomable(false);
      var bounds=new kakao.maps.LatLngBounds();
      near.forEach(function(v){ if(typeof v.lat!=='number')return; var pos=new kakao.maps.LatLng(v.lat,v.lng); new kakao.maps.Marker({map:map,position:pos}); bounds.extend(pos); });
      if(!bounds.isEmpty()) map.setBounds(bounds);
      setTimeout(function(){try{map.relayout(); if(!bounds.isEmpty())map.setBounds(bounds);}catch(_){}} ,160);
    }catch(e){ el.innerHTML='<div style="display:grid;place-items:center;height:100%;color:var(--muted);font-size:12px">지도 미리보기</div>'; }
  });
}

// AI가 분석·고민하는 인터스티셜 (단계별 체크 후 onDone)
function aiThink(cfg){
  var steps=cfg.steps||[], title=cfg.title||'AI가 분석하고 있어요', sub=cfg.sub||'잠시만요, 최적의 방법을 찾고 있어요';
  var ov=document.getElementById('aiov');
  if(!ov){ov=document.createElement('div');ov.id='aiov';ov.className='aiov';document.querySelector('.phone').appendChild(ov);}
  ov.innerHTML='<div class="aiov-orb">'+ic('ai',42)+'</div><div class="aiov-title">'+title+'</div><div class="aiov-sub">'+sub+'</div>'
    +'<div class="aiov-steps">'+steps.map(function(s,i){return '<div class="aiov-step" data-i="'+i+'"><span class="aiov-ic"><span class="aiov-spin"></span></span><span style="font-size:13.5px;font-weight:600">'+s+'</span></div>';}).join('')+'</div>';
  void ov.offsetWidth; ov.classList.add('show');
  var rows=ov.querySelectorAll('.aiov-step'), i=0, per=cfg.per||360;
  function tick(){
    if(i>0){var p=rows[i-1];p.querySelector('.aiov-ic').innerHTML=ic('check',15,3.2);}
    if(i<rows.length){rows[i].classList.add('on');i++;setTimeout(tick,per);}
    else setTimeout(function(){ov.classList.remove('show');if(cfg.onDone)cfg.onDone();},300);
  }
  tick();
}

  } else if(_grps.length){
    var gi=_v.id.charCodeAt(_v.id.length-1)%_grps.length;   // VOC마다 다른 대표 조치결과
    sample=polishResult(_grps[gi].rs[0]);
  } else {
    sample='현장 점검 후 정상 조치 완료했습니다.';
  }
  const vt=$("#vtext");let i=0;
  const timer=setInterval(()=>{
    i+=1;vt.textContent=sample.slice(0,i);
    if(i>=sample.length){clearInterval(timer);$("#vsave").disabled=false;$("#vsave").classList.add('grad');document.querySelector('.mic').style.animation='none';document.querySelector('#wave').style.opacity=.3;}
  },42);
  $("#vcancel").onclick=()=>{clearInterval(timer);closeSheet();};
  $("#vsave").onclick=()=>{clearInterval(timer);closeSheet();onDone(sample);};
}

/* =========================================================
   Event binding per screen
   ========================================================= */
function bindScreen(el,name,params){
  // universal
  el.querySelectorAll('[data-voc]').forEach(n=>n.onclick=e=>{e.stopPropagation();push('detail',{id:n.dataset.voc});});
  el.querySelectorAll('.back').forEach(n=>n.onclick=()=>back());
  el.querySelectorAll('[data-call]').forEach(n=>n.onclick=e=>{e.stopPropagation();haptic(n);
    var raw=n.dataset.call||''; var num=raw.replace(/[^0-9+]/g,'');
    toast('전화 앱으로 연결합니다<br>'+raw,'phone');
    try{ window.location.href='tel:'+num; }catch(_){}
  });
  el.querySelectorAll('[data-nav]').forEach(n=>n.onclick=e=>{e.stopPropagation();haptic(n);push('navi',{id:n.dataset.nav});});
  el.querySelectorAll('[data-startnav]').forEach(n=>n.onclick=e=>{e.stopPropagation();haptic(n);
    var v=VOCS.find(x=>x.id===n.dataset.startnav);
    if(v&&v.lat){ window.open('https://map.kakao.com/link/to/'+encodeURIComponent(v.company)+','+v.lat+','+v.lng,'_blank'); toast('카카오맵 길찾기를 엽니다','nav'); }
    else toast('길안내를 시작합니다','nav');
  });
  el.querySelectorAll('[data-sms]').forEach(n=>n.onclick=e=>{e.stopPropagation();sheetSms(n.dataset.sms);});
  el.querySelectorAll('[data-schedule]').forEach(n=>n.onclick=e=>{e.stopPropagation();sheetSchedule(n.dataset.schedule);});
  el.querySelectorAll('[data-tab]').forEach(n=>n.onclick=e=>{e.stopPropagation();switchTab(n.dataset.tab);});
  el.querySelectorAll('[data-home]').forEach(n=>n.onclick=()=>switchTab('home'));
  el.querySelectorAll('.sw').forEach(sw=>{if(!sw.dataset.bound){sw.dataset.bound=1;sw.onclick=()=>sw.classList.toggle('on');}});

  // animated counters + tracks
  el.querySelectorAll('[data-count]').forEach(n=>{const to=+n.dataset.count;let c=0;const step=Math.max(1,Math.ceil(to/22));const t=setInterval(()=>{c+=step;if(c>=to){c=to;clearInterval(t);}n.textContent=c;},32);});
  setTimeout(()=>el.querySelectorAll('[data-w]').forEach(n=>n.style.width=n.dataset.w),200);

  if(name==='login'){$("#loginBtn").onclick=()=>{haptic($("#loginBtn"));toast('인증 완료','check');setTimeout(()=>{switchTab('home');},500);};}

  if(name==='home'){
    el.querySelectorAll('[data-seniortoggle]').forEach(sw=>sw.onclick=()=>{
      USER.seniorMode=!USER.seniorMode;
      sw.classList.toggle('on',USER.seniorMode);
      var lb=el.querySelector('#seniorLabel'); if(lb)lb.style.color=USER.seniorMode?'var(--primary)':'var(--muted)';
      haptic(sw);
      toast(USER.seniorMode?'숙련자 모드 ON · 바로 결과 입력':'숙련자 모드 OFF · AI 가이드 선택', USER.seniorMode?'flash':'ai');
    });
    renderHomeMini(el);
  }

  if(name==='vocList'){
    el.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>resetTo('vocList',{filter:b.dataset.filter}));
    // skeleton then real
    const body=el.querySelector('#vocListBody');const real=el.querySelector('#vocListReal');
    body.innerHTML=Array.from({length:4}).map(()=>`<div class="card" style="margin-bottom:12px"><div class="skel" style="height:14px;width:40%"></div><div class="skel" style="height:44px;width:100%;margin-top:14px;border-radius:12px"></div><div class="skel" style="height:12px;width:60%;margin-top:12px"></div></div>`).join('');
    setTimeout(()=>{body.style.display='none';real.style.display='block';bindScreen(real,'_cards',{});},650);
  }

  if(name==='detail'){
    el.querySelectorAll('[data-aidirect]').forEach(b=>b.onclick=()=>{
      const id=b.dataset.id, mode=b.dataset.aidirect;
      STATE[id].aiMode=mode; STATE[id].cause=null; STATE[id].causes=[]; STATE[id].result='';
      haptic(b);
      if(mode==='use') aiThink({title:'AI가 진단하고 있어요',sub:'접수 내용과 기기 매뉴얼을 분석 중이에요',steps:['접수 내용 분석','기기 매뉴얼 대조','과거 이력 확인','유사 조치 사례 검색','진단 항목 도출'],per:340,onDone:function(){push('diagnose',{id});}});
      else push('result',{id});
    });
    el.querySelectorAll('[data-view-result]').forEach(n=>n.onclick=()=>push('result',{id:n.dataset.viewResult}));
  }

  if(name==='aiToggle'){
    el.querySelectorAll('[data-ai]').forEach(c=>c.onclick=()=>{
      const id=c.dataset.id;STATE[id].aiMode=c.dataset.ai;haptic(c);
      if(c.dataset.ai==='use')push('diagnose',{id});
      else{ // skip → straight to result with voice/text
        STATE[id].result='';push('result',{id});
      }
    });
  }

  if(name==='route'){ renderMap(el); }

  if(name==='navi'){
    const path=el.querySelector('#route');const car=el.querySelector('.car');
    if(path&&car){
      const len=path.getTotalLength();const N=64;const frames=[];
      for(let i=0;i<=N;i++){
        const d=len*i/N;const p=path.getPointAtLength(d);
        const p2=path.getPointAtLength(Math.min(len,d+0.6));
        const ang=Math.atan2(p2.y-p.y,p2.x-p.x)*180/Math.PI+90;
        frames.push({transform:`translate(${p.x.toFixed(2)}px,${p.y.toFixed(2)}px) rotate(${ang.toFixed(1)}deg)`});
      }
      try{car.animate(frames,{duration:7000,iterations:Infinity,easing:'linear'});}catch(e){}
    }
  }

  if(name==='diagnose'){
    // 가이드 없는 유형: 바로 직접 결과 입력
    el.querySelectorAll('[data-noguide]').forEach(n=>n.onclick=()=>{const id=n.dataset.noguide;STATE[id].cause=null;STATE[id].result='';haptic(n);push('result',{id});});
    const sel=new Set();const btn=el.querySelector('#toGuide');const nEl=el.querySelector('#dxN');
    if(btn){
      el.querySelectorAll('[data-dx]').forEach(c=>c.onclick=()=>{
        const i=+c.dataset.dx;
        if(sel.has(i)){sel.delete(i);c.classList.remove('sel');}else{sel.add(i);c.classList.add('sel');}
        btn.disabled=sel.size===0;
        if(nEl)nEl.textContent=sel.size?`(${sel.size})`:'';
        haptic(c);
      });
      btn.onclick=()=>{if(!sel.size)return;
        STATE[params.id].causes=[...sel].sort((a,b)=>a-b);
        aiThink({title:'AI가 조치 방법을 정리하고 있어요',sub:'선택한 증상에 맞는 조치 순서를 구성 중이에요',steps:['선택한 증상 분석','매뉴얼 조치 절차 매칭','중복 조치 정리','최적 순서 도출'],per:360,onDone:function(){push('guide',{id:params.id});}});
      };
    }
  }

  if(name==='guide'){
    const steps=[...el.querySelectorAll('.gstep')];const done=new Set();const btn=el.querySelector('#toResult');
    steps.forEach(s=>s.onclick=()=>{
      const i=+s.dataset.step;const sn=s.querySelector('.snum');
      if(done.has(i)){done.delete(i);sn.style.background='var(--surface3)';sn.style.color='var(--muted)';sn.textContent=i+1;s.style.borderColor='var(--line)';}
      else{done.add(i);sn.style.background='var(--grad-mint)';sn.style.color='#04121a';sn.innerHTML=ic('check',16,3.2);s.style.borderColor='rgba(0,191,165,.4)';haptic(s);}
    });
    btn.onclick=()=>{STATE[params.id].actionDone=true;STATE[params.id].result='';push('result',{id:params.id});};
  }

  if(name==='result'){
    const id=params.id;const st=STATE[id];
    if(st.completed) return; // 완료 VOC = 읽기전용 조치 결과 화면 (바인딩 없음)
    const ta=el.querySelector('#resultTa');
    ta.oninput=()=>st.result=ta.value;
    // 자동 작성 결과 타이핑 효과
    if(ta.dataset.type==='1'){ setTimeout(()=>typeInto(ta, st.result, 22), 260); }
    el.querySelectorAll('[data-quick]').forEach(c=>c.onclick=()=>{if(ta._finish)ta._finish();ta.value=(ta.value?ta.value+' ':'')+c.dataset.quick;st.result=ta.value;ta.focus();});
    el.querySelectorAll('[data-voice]').forEach(c=>c.onclick=()=>{if(ta._finish)ta._finish();sheetVoice(id,txt=>{ta.value=(ta.value?ta.value+' ':'')+txt;st.result=ta.value;toast('음성 변환 완료','mic');});});
    el.querySelectorAll('[data-status]').forEach(c=>c.onclick=()=>{el.querySelectorAll('[data-status]').forEach(x=>x.classList.remove('on'));c.classList.add('on');st.compStatus=c.dataset.status;});
    el.querySelectorAll('[data-flag]').forEach(sw=>sw.onclick=()=>sw.classList.toggle('on'));
    const cb=el.querySelector('#complete');
    cb.onclick=()=>{
      if(ta._finish)ta._finish();
      st.result=ta.value.trim();
      if(!st.result){toast('조치 결과를 입력해주세요','warn');ta.focus();ta.style.borderColor='var(--danger)';return;}
      st.completed=true;haptic(cb);push('done',{id});
    };
    // if skip mode & empty, auto-offer voice
    if(st.aiMode==='skip' && !st.result){setTimeout(()=>{if(stack[stack.length-1].name==='result')sheetVoice(id,txt=>{ta.value=txt;st.result=txt;toast('음성 변환 완료','mic');});},550);}
  }
}

/* =========================================================
   Tab bar
   ========================================================= */
function renderTabs(){
  const tb=$("#tabbar");
  const rootNames=['home','vocList','route','alerts','my'];
  const cur=stack[stack.length-1];
  const showTab = cur && rootNames.includes(cur.name);
  if(!showTab || cur.name==='login'){tb.innerHTML='';return;}
  const tabs=[['home','홈','home'],['voc','VOC','list'],['route','지도','pin'],['alerts','알림','bell'],['my','마이','user']];
  tb.className='tabbar';
  tb.innerHTML=tabs.map(([k,t,i])=>`<div class="tab ${activeTab===k?'on':''}" data-t="${k}">${k==='alerts'?'<span class="badge-n">3</span>':''}<span class="ti">${ic(i,23,2)}</span>${t}</div>`).join('');
  tb.querySelectorAll('[data-t]').forEach(n=>n.onclick=()=>{haptic(n);switchTab(n.dataset.t);});
}

/* =========================================================
   Boot
   ========================================================= */
(function boot(){
  resetTo('login');
  // login has no tab
  const tb=$("#tabbar");tb.className='';tb.innerHTML='';
  try{const now=new Date();/* clock may be blocked in some envs */}catch(e){}
})();

/* PWA 서비스워커 등록 + 새 버전 자동 갱신 */
if('serviceWorker' in navigator){
  var _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(_swReloaded)return; _swReloaded=true; location.reload();
  });
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){ reg.update&&reg.update(); }).catch(function(){});
  });
}
